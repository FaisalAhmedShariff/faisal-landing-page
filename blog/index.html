<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Faisal Ahmed Shariff</title>
  <meta name="description" content="Thoughts, building progress, and engineering logs from Faisal Ahmed Shariff." />
  
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon_io/favicon-16x16.png">
  <link rel="manifest" href="../assets/favicon_io/site.webmanifest">
  <link rel="shortcut icon" href="../assets/favicon_io/favicon.ico">
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ====================================================================
       TOKENS — DARK (default)
    ==================================================================== */
    :root {
      --bg: #080c10;
      --fg: rgba(255, 255, 255, 0.95);
      --fg-muted: rgba(255, 255, 255, 0.85);
      --fg-light: rgba(255, 255, 255, 0.6);
      --border: rgba(255, 255, 255, 0.12);
      --card-bg: rgba(255, 255, 255, 0.04);
      --primary: #4af0c4;
      --primary-dim: rgba(74,240,196,0.13);
      --photo-shadow: 0 0 0 3px rgba(74,240,196,0.22), 0 28px 80px rgba(0,0,0,0.75);
      --card-shadow: 0 20px 64px rgba(0,0,0,0.55);
      --toggle-bg: rgba(255, 255, 255, 0.06);
      --toggle-border: rgba(255, 255, 255, 0.12);
      --btn-text: #080c10;
    }
    html.light {
      --bg: #f5f6fa;
      --fg: #0a0e14;
      --fg-muted: rgba(10, 14, 20, 0.75);
      --fg-light: rgba(10, 14, 20, 0.52);
      --border: rgba(10, 14, 20, 0.12);
      --card-bg: #ffffff;
      --primary: #0059d1;
      --primary-dim: rgba(0, 89, 209, 0.10);
      --photo-shadow: 0 0 0 3px rgba(0, 89, 209, 0.18), 0 28px 64px rgba(0, 0, 0, 0.14);
      --card-shadow: 0 8px 40px rgba(0, 0, 0, 0.09);
      --toggle-bg: rgba(255, 255, 255, 0.55);
      --toggle-border: rgba(10, 14, 20, 0.12);
      --btn-text: #ffffff;
    }

    /* ====================================================================
       RESET & BASE
    ==================================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #080c10;
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
      transition: color 0.4s;
    }

    /* Light body has transparent background to reveal moving smoke container */
    html.light body {
      background: transparent;
    }
    html.light body::before {
      display: none;
    }

    /* ---- LIGHT MODE DYNAMIC SMOKE BACKGROUND ---- */
    .smoke-bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      overflow: hidden;
      pointer-events: none;
      background: var(--bg);
      display: none;
    }
    html.light .smoke-bg {
      display: block;
    }
    .smoke-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      -webkit-filter: blur(140px);
      opacity: 0.85;
      pointer-events: none;
      will-change: transform;
    }
    .blob-cyan-top {
      top: -10%;
      left: -15%;
      width: 75vw;
      height: 75vw;
      background: radial-gradient(circle, rgba(0, 190, 255, 0.22) 0%, rgba(0, 120, 255, 0.08) 50%, rgba(0, 0, 0, 0) 75%);
      animation: floatCyanTop 38s infinite alternate ease-in-out;
    }
    .blob-cyan-bottom {
      bottom: -10%;
      left: -20%;
      width: 80vw;
      height: 80vw;
      background: radial-gradient(circle, rgba(0, 210, 255, 0.18) 0%, rgba(0, 80, 255, 0.06) 50%, rgba(0, 0, 0, 0) 75%);
      animation: floatCyanBottom 46s infinite alternate ease-in-out;
    }
    .blob-center-purple {
      top: 20%;
      left: 15%;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(160, 90, 255, 0.15) 0%, rgba(110, 30, 200, 0.05) 50%, rgba(0, 0, 0, 0) 75%);
      animation: floatCenterPurple 42s infinite alternate ease-in-out;
    }
    .blob-magenta-top {
      top: -5%;
      right: -15%;
      width: 80vw;
      height: 80vw;
      background: radial-gradient(circle, rgba(255, 80, 200, 0.22) 0%, rgba(200, 0, 255, 0.08) 50%, rgba(0, 0, 0, 0) 75%);
      animation: floatMagentaTop 40s infinite alternate ease-in-out;
    }
    .blob-magenta-bottom {
      bottom: -15%;
      right: -20%;
      width: 75vw;
      height: 75vw;
      background: radial-gradient(circle, rgba(236, 0, 140, 0.18) 0%, rgba(142, 45, 226, 0.06) 50%, rgba(0, 0, 0, 0) 75%);
      animation: floatMagentaBottom 44s infinite alternate ease-in-out;
    }

    @keyframes floatCyanTop {
      0% { transform: translate(0, 0) rotate(0deg) scale(1); }
      50% { transform: translate(8vw, 6vh) rotate(15deg) scale(1.1); }
      100% { transform: translate(-3vw, 12vh) rotate(-10deg) scale(0.95); }
    }
    @keyframes floatCyanBottom {
      0% { transform: translate(0, 0) rotate(0deg) scale(1.05); }
      50% { transform: translate(-5vw, -8vh) rotate(-15deg) scale(0.95); }
      100% { transform: translate(3vw, 4vh) rotate(10deg) scale(1.05); }
    }
    @keyframes floatCenterPurple {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(3vw, -5vh) scale(1.1); }
      100% { transform: translate(-2vw, 5vh) scale(0.95); }
    }
    @keyframes floatMagentaTop {
      0% { transform: translate(0, 0) rotate(0deg) scale(1); }
      50% { transform: translate(-8vw, 8vh) rotate(-20deg) scale(1.15); }
      100% { transform: translate(2vw, -4vh) rotate(10deg) scale(0.9); }
    }
    @keyframes floatMagentaBottom {
      0% { transform: translate(0, 0) rotate(0deg) scale(0.95); }
      50% { transform: translate(6vw, -6vh) rotate(20deg) scale(1.1); }
      100% { transform: translate(-3vw, 3vh) rotate(-10deg) scale(0.95); }
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button { cursor: pointer; font-family: inherit; background: none; border: none; color: inherit; }
    ::selection { background: var(--primary); color: #000; }

    /* ====================================================================
       LOADER
    ==================================================================== */
    #loader {
      position: fixed; inset: 0; z-index: 9999;
      background: #080c10;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.7s ease;
    }
    #loader.hide { opacity: 0; pointer-events: none; }
    .loader-count {
      font-family: 'Syne', sans-serif;
      font-size: clamp(80px, 18vw, 240px);
      font-weight: 800; color: #f0f4f8; line-height: 1;
    }
    .loader-pct { font-size: 0.34em; vertical-align: super; opacity: 0.38; margin-left: 0.06em; }

    /* ====================================================================
       ANIMATED BLOB BAND — dark mode: scrolls right → left
    ==================================================================== */
    .blob-band {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }
    .blob-band svg {
      position: absolute; top: -30%; left: 0;
      width: 260vw; height: 160%;
      opacity: 0;
      animation: bandSlide 52s linear infinite;
      transition: opacity 0.6s;
    }
    body.loaded .blob-band svg { opacity: 1; }
    html.light .blob-band svg  { opacity: 0 !important; }
    @keyframes bandSlide {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .grain {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.032;
    }
    html.light .grain { opacity: 0.02; }

    .grid-lines {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .grid-lines svg { width: 100%; height: 100%; }

    /* ====================================================================
       HEADER
    ==================================================================== */
    header {
      position: fixed; top: 0; left: 0; width: 100%;
      z-index: 200;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 22px 40px;
      background: transparent;
      border-bottom: 1px solid transparent;
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      transition: background 0.3s, padding 0.3s, border-color 0.3s, backdrop-filter 0.3s;
    }
    header.scrolled {
      padding: 8px 40px;
      background: rgba(0, 0, 0, 0.12);
      border-bottom: none;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    html.light header.scrolled {
      background: rgba(255, 255, 255, 0.08);
    }

    .logo {
      display: flex; align-items: center; gap: 11px;
      justify-self: start;
    }
    .logo-box {
      width: 36px; height: 36px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.25s;
    }
    .logo-box:hover { border-color: var(--primary); }
    .logo-box svg { width: 16px; height: 16px; stroke: var(--fg); }
    .logo-name {
      font-size: 1.05rem; font-weight: 600;
      letter-spacing: -0.01em; color: var(--fg);
    }

    .header-socials {
      display: flex; gap: 18px; align-items: center;
      justify-self: center;
    }
    .header-socials a {
      color: var(--fg-muted);
      transition: color 0.2s, transform 0.2s;
      display: flex; align-items: center;
    }
    .header-socials a:hover { color: var(--fg); transform: translateY(-2px); }
    .header-socials svg { width: 18px; height: 18px; }

    .hamburger {
      width: 40px; height: 40px;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      transition: border-color 0.22s, transform 0.22s;
    }
    .hamburger:hover { border-color: var(--primary); transform: scale(1.05); }
    .hamburger span {
      display: block; width: 16px; height: 1.8px;
      background: var(--fg); transition: transform 0.22s, width 0.22s;
    }

    .blog-nav-link {
      font-size: 1.05rem;
      color: var(--fg);
      text-decoration: none;
      display: inline-block;
      position: relative;
      padding-bottom: 4px;
      transition: color 0.3s ease, transform 0.3s ease;
    }
    .blog-nav-link:hover {
      color: var(--primary);
      transform: translateY(-1px);
    }
    .blog-nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1.5px;
      background-color: var(--primary);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .blog-nav-link:hover::after {
      transform: scaleX(1);
      transform-origin: left;
    }
    .founder-part {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600; /* SemiBold */
      text-transform: none;
      letter-spacing: -0.015em;
    }
    .notes-part {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      text-transform: none;
      margin-left: 2px;
    }


    /* ====================================================================
       MOBILE NAV MENU
    ==================================================================== */
    #mobile-menu {
      position: fixed; inset: 0; z-index: 500;
      background: #080c10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #mobile-menu.open { opacity: 1; pointer-events: auto; }
    .mobile-nav-link {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem; color: rgba(255,255,255,0.7);
      transition: color 0.22s, transform 0.22s;
    }
    .mobile-nav-link:hover { color: #fff; transform: scale(1.04); }
    .menu-close {
      position: absolute; top: 22px; right: 28px;
      font-size: 2.5rem; color: rgba(255,255,255,0.6);
      width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
    }
    .menu-close:hover { color: #fff; }

    /* ====================================================================
       FLOATING CONTROLS
    ==================================================================== */
    #theme-toggle {
      position: fixed; bottom: 28px; left: 28px; z-index: 150;
      width: 50px; height: 50px; border-radius: 50%;
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      color: var(--fg-muted);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: border-color 0.22s, color 0.22s, transform 0.22s, background 0.4s;
    }
    #theme-toggle:hover {
      border-color: var(--primary); color: var(--primary); transform: scale(1.1);
    }
    #theme-toggle svg { width: 17px; height: 17px; }

    /* ====================================================================
       BLOG LAYOUT & SECTIONS
    ==================================================================== */
    section { position: relative; z-index: 10; padding: 120px 40px 90px; }
    
    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 6vw, 4.4rem); font-weight: 400;
      text-align: center; margin-bottom: 56px;
      letter-spacing: -0.02em; color: var(--fg);
    }

    .blog-posts-container {
      max-width: 940px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 32px;
      padding-bottom: 90px;
    }

    .blog-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 26px;
      display: flex;
      flex-direction: column;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .blog-card:hover {
      transform: translateY(-3px);
      border-color: var(--primary);
      box-shadow: var(--card-shadow);
    }
    .blog-card-date {
      font-family: monospace;
      font-size: 0.8rem;
      color: var(--fg-light);
      margin-bottom: 12px;
    }
    .blog-card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem;
      color: var(--fg);
      margin-bottom: 12px;
      line-height: 1.35;
      font-weight: 400;
    }
    .blog-card-excerpt {
      color: var(--fg-muted);
      font-size: 0.92rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .blog-card-link {
      margin-top: auto;
      font-weight: 600;
      color: var(--primary);
      font-size: 0.88rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* Post Detail Styling */
    #blog-detail-section {
      max-width: 780px;
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
    }

    .post-detail-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 6vw, 3.4rem);
      line-height: 1.15;
      color: var(--fg);
      margin-bottom: 12px;
      font-weight: 400;
    }
    .post-detail-date {
      font-family: monospace;
      font-size: 0.88rem;
      color: var(--fg-light);
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 18px;
    }
    .post-detail-body {
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--fg-muted);
    }
    .post-detail-body p {
      margin-bottom: 24px;
    }
    .post-detail-body h2, .post-detail-body h3 {
      font-family: 'DM Serif Display', serif;
      font-weight: 400;
      color: var(--fg);
      margin: 44px 0 20px;
    }
    .post-detail-body h2 { font-size: 1.8rem; }
    .post-detail-body h3 { font-size: 1.4rem; }
    .post-detail-body ul, .post-detail-body ol {
      margin-bottom: 24px;
      padding-left: 22px;
    }
    .post-detail-body li {
      margin-bottom: 8px;
    }
    .post-detail-body blockquote {
      border-left: 3px solid var(--primary);
      padding-left: 20px;
      margin: 32px 0;
      font-style: italic;
      color: var(--fg);
    }
    .post-detail-body pre {
      background: rgba(0,0,0,0.3);
      padding: 18px;
      border-radius: 10px;
      overflow-x: auto;
      font-family: monospace;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      font-size: 0.92rem;
    }

    /* ====================================================================
       FOOTER
    ==================================================================== */
    footer {
      padding: 22px 40px; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.76rem; color: var(--fg-light);
      position: relative; z-index: 10;
    }

    /* ====================================================================
       SCROLL REVEAL
    ==================================================================== */
    .reveal {
      opacity: 0; transform: translateY(28px);
      transition: opacity 0.72s cubic-bezier(0.22, 1, 0.36, 1), transform 0.72s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .reveal.visible { opacity: 1; transform: none; }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.21s; }

    /* Responsive */
    @media (max-width: 768px) {
      header { padding: 18px 20px; grid-template-columns: 1fr auto; }
      header.scrolled { padding: 6px 20px; }
      .header-socials { display: none; }
      section { padding: 90px 20px 60px; }
      footer { flex-direction: column; gap: 8px; text-align: center; padding: 20px; }
    }

    /* ---- NEWSLETTER POPUP MODAL ---- */
    .newsletter-popup-overlay {
      --popup-overlay: rgba(0, 0, 0, 0.5);
      --popup-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.005));
      --popup-border: rgba(255, 255, 255, 0.1);
      --popup-input-bg: rgba(255, 255, 255, 0.01);
      --popup-shadow: 0 30px 60px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.12);

      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--popup-overlay);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    :root.light .newsletter-popup-overlay {
      --popup-overlay: rgba(255, 255, 255, 0.25);
      --popup-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.1));
      --popup-border: rgba(255, 255, 255, 0.45);
      --popup-input-bg: rgba(255, 255, 255, 0.15);
      --popup-shadow: 0 30px 60px rgba(0, 0, 0, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }
    .newsletter-popup-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    .newsletter-popup-content {
      background: var(--popup-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--popup-border);
      padding: 48px 36px;
      border-radius: 24px;
      max-width: 460px;
      width: 90%;
      position: relative;
      text-align: center;
      box-shadow: var(--popup-shadow);
      transform: scale(0.92);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .newsletter-popup-overlay.show .newsletter-popup-content {
      transform: scale(1);
    }
    .newsletter-popup-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: var(--fg-muted);
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s, transform 0.2s;
    }
    .newsletter-popup-close:hover {
      color: var(--fg);
      transform: scale(1.15);
    }
    .newsletter-popup-content h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      margin-bottom: 12px;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--fg);
    }
    .newsletter-popup-content p {
      font-size: 0.95rem;
      color: var(--fg-muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .popup-signup-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .popup-signup-form input[type="email"] {
      width: 100%;
      padding: 14px 20px;
      border-radius: 48px;
      border: 1px solid var(--popup-border);
      background: var(--popup-input-bg);
      color: var(--fg);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .popup-signup-form input[type="email"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-dim);
    }
    .popup-signup-form .btn-solid {
      width: 100%;
      padding: 14px 20px;

  <script>
    const supabaseUrl = 'https://nesfzytfgswcvgsrruxo.supabase.co';
    const supabaseKey = 'sb_publishable_zOQxpja5sMsQIXs6MgsMyA_6mNZ-Ffo';
    const { createClient } = supabase;
    const supabaseClient = createClient(supabaseUrl, supabaseKey);

    let dataLoaded = false;
    let blogPosts = [];

    // Helper: Map social platforms to SVGs
    function getSocialSvg(platform) {
      platform = platform.toLowerCase();
      if (platform === 'linkedin') return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>`;
      if (platform === 'instagram') return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>`;
      if (platform === 'github') return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>`;
      if (platform === 'email' || platform === 'mail') return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`;
      return '';
    }

    async function loadBlogData() {
      try {
        const [configRes, postsRes] = await Promise.all([
          supabaseClient.from('portfolio_config').select('*'),
          supabaseClient.from('blog_posts')
            .select('*')
            .eq('is_visible', true)
            .lte('published_at', new Date().toISOString())
            .order('is_pinned', { ascending: false })
            .order('pin_order', { ascending: true, nullsFirst: false })
            .order('published_at', { ascending: false })
        ]);

        if (configRes.error) throw configRes.error;
        if (postsRes.error) throw postsRes.error;

        const config = {};
        configRes.data.forEach(item => {
          config[item.key] = item.value;
        });

        // 1. Populate Social platforms in Header
        if (config.hero_socials && Array.isArray(config.hero_socials)) {
          const headerSocials = document.querySelector('.header-socials');
          if (headerSocials) {
            headerSocials.innerHTML = config.hero_socials.map(s => {
              const svg = getSocialSvg(s.platform);
              return `<a href="${s.url}" id="h-${s.platform}" target="_blank" rel="noopener noreferrer" aria-label="${s.label}">${svg}</a>`;
            }).join('');
          }
        }

        // 2. Populate Footer fields
        if (config.footer_copyright) document.getElementById('ft-copyright').innerText = config.footer_copyright;
        if (config.footer_location) document.getElementById('ft-location').innerText = config.footer_location;

        blogPosts = postsRes.data;

        // 3. Render content depending on URL routing
        renderView();

        dataLoaded = true;
      } catch (err) {
        console.error('Error fetching blog data:', err);
        dataLoaded = true;
      }
    }

    function renderView() {
      const urlParams = new URLSearchParams(window.location.search);
      const postSlug = urlParams.get('post');

      const listSection = document.getElementById('blog-list-section');
      const detailSection = document.getElementById('blog-detail-section');

      if (postSlug) {
        // Post Detail View
        const post = blogPosts.find(p => p.slug === postSlug);
        
        listSection.style.display = 'none';
        detailSection.style.display = 'block';

        const detailContent = document.getElementById('post-detail-content');
        if (post) {
          const dateStr = new Date(post.published_at).toLocaleDateString(undefined, {
            year: 'numeric', month: 'long', day: 'numeric'
          });
          document.title = `${post.title} | Faisal Ahmed Shariff`;
          detailContent.innerHTML = `
            <div class="reveal">
              <h1 class="post-detail-title">${escapeHtml(post.title)}</h1>
              <div class="post-detail-date">Published on ${dateStr}</div>
              <div class="post-detail-body">${post.content}</div>
            </div>
          `;
        } else {
          document.title = 'Post Not Found | Faisal Ahmed Shariff';
          detailContent.innerHTML = `
            <div style="text-align: center; padding: 40px;">
              <h2>Post Not Found</h2>
              <p style="color: var(--fg-muted); margin-top: 10px;">The blog post you are looking for does not exist or has been removed.</p>
            </div>
          `;
        }
        initScrollReveal();
      } else {
        // Listing View
        document.title = 'Blog | Faisal Ahmed Shariff';
        listSection.style.display = 'block';
        detailSection.style.display = 'none';

        const container = document.getElementById('blog-posts-container');
        if (blogPosts.length === 0) {
          container.style.display = 'block';
          container.innerHTML = `<p style="color:var(--fg-muted); text-align:center; padding: 40px; font-size: 1.1rem;">No blog posts published yet.</p>`;
          initScrollReveal();
          return;
        }

        container.style.display = 'grid';
        container.innerHTML = blogPosts.map((post, i) => {
          const dateStr = new Date(post.published_at).toLocaleDateString(undefined, {
            year: 'numeric', month: 'long', day: 'numeric'
          });
          const delayClass = i % 3 === 1 ? 'reveal-delay-1' : (i % 3 === 2 ? 'reveal-delay-2' : '');
          const pinBadge = post.is_pinned 
            ? `<span style="color: var(--primary); font-weight: 600; display: flex; align-items: center; gap: 4px; font-family: sans-serif; font-size: 0.75rem; letter-spacing: 0.05em; text-transform: uppercase;">
                <span style="font-size: 0.85rem; line-height: 1;">📌</span> Pinned
               </span>` 
            : '';
          const cardStyle = post.is_pinned
            ? `border-top: 2px solid var(--primary); background: linear-gradient(180deg, rgba(74, 240, 196, 0.03) 0%, var(--card-bg) 100%);`
            : '';

          return `
            <a href="?post=${post.slug}" class="blog-card reveal ${delayClass}" style="${cardStyle}">
              <div class="blog-card-date" style="display: flex; align-items: center; justify-content: space-between;">
                <span>${dateStr}</span>
                ${pinBadge}
              </div>
              <h2 class="blog-card-title">${escapeHtml(post.title)}</h2>
              <p class="blog-card-excerpt">${escapeHtml(post.excerpt)}</p>
              <span class="blog-card-link">
                Read Post
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="7" y1="17" x2="17" y2="7"></line>
                  <polyline points="7 7 17 7 17 17"></polyline>
                </svg>
              </span>
            </a>
          `;
        }).join('');
        initScrollReveal();
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // Subscribe to realtime updates
    function setupRealtime() {
      supabaseClient
        .channel('blog_realtime_updates')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'blog_posts' }, async () => {
          const { data, error } = await supabaseClient
            .from('blog_posts')
            .select('*')
            .eq('is_visible', true)
            .lte('published_at', new Date().toISOString())
            .order('is_pinned', { ascending: false })
            .order('pin_order', { ascending: true, nullsFirst: false })
            .order('published_at', { ascending: false });
          if (!error && data) {
            blogPosts = data;
            renderView();
          }
        })
        .subscribe();
    }

    // Visitor session unique tracking
    (async function trackVisitor() {
      try {
        if (localStorage.getItem('faisal_admin_mode') === 'true') {
          return;
        }
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session && session.user && session.user.email === 'faashariff2829@gmail.com') {
          localStorage.setItem('faisal_admin_mode', 'true');
          return;
        }

        if (!sessionStorage.getItem('faisal_portfolio_session')) {
          const sessionKey = 'session_' + Math.random().toString(36).substring(2, 15) + '_' + Date.now();
          sessionStorage.setItem('faisal_portfolio_session', sessionKey);
          
          await supabaseClient
            .from('page_views')
            .insert([{ source_page: window.location.href }]);
        }
      } catch (err) {
        console.error('Error tracking visitor:', err);
      }
    })();

    /* ---- LOADER ANIMATION CONTROL ---- */
    (function () {
      const loaderEl = document.getElementById('loader');
      const countEl  = document.getElementById('loader-count');
      let count = 0;
      const tick = setInterval(() => {
        if (count < 99) {
          count += Math.ceil(Math.random() * 3 + 1);
          if (count > 99) count = 99;
          countEl.innerHTML = count + '<span class="loader-pct">%</span>';
        } else if (count === 99 && dataLoaded) {
          count = 100;
          clearInterval(tick);
          countEl.innerHTML = '100<span class="loader-pct">%</span>';
          setTimeout(() => {
            loaderEl.classList.add('hide');
            document.body.classList.add('loaded');
          }, 280);
        }
      }, 17);
    })();

    /* ---- DARK / LIGHT TOGGLE ---- */
    const html     = document.documentElement;
    const moonIcon = document.getElementById('moon-icon');
    const sunIcon  = document.getElementById('sun-icon');

    function setLight(on) {
      if (on) {
        html.classList.add('light');
        moonIcon.style.display = 'none';
        sunIcon.style.display  = 'block';
      } else {
        html.classList.remove('light');
        moonIcon.style.display = 'block';
        sunIcon.style.display  = 'none';
      }
      localStorage.setItem('theme', on ? 'light' : 'dark');
    }

    document.getElementById('theme-toggle').addEventListener('click', () => {
      setLight(!html.classList.contains('light'));
    });

    if (localStorage.getItem('theme') === 'light') setLight(true);

    /* ---- HAMBURGER MENU ---- */
    const hamburger  = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    const menuClose  = document.getElementById('menu-close');
    
    if (hamburger) {
      hamburger.addEventListener('click', () => { mobileMenu.classList.add('open'); document.body.style.overflow = 'hidden'; });
    }
    if (menuClose) {
      menuClose.addEventListener('click', close);
    }
    document.querySelectorAll('.mobile-nav-link').forEach(a => a.addEventListener('click', close));
    function close() { mobileMenu.classList.remove('open'); document.body.style.overflow = ''; }

    /* ---- SCROLL REVEAL ---- */
    let obs = null;
    function initScrollReveal() {
      if (obs) {
        obs.disconnect();
      }
      obs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
      }, { threshold: 0.05 });

      document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    }

    // Load URL state pop changes
    window.addEventListener('popstate', () => {
      renderView();
    });

    // Handle back button clicks without page refresh
    document.getElementById('btn-back-blog').addEventListener('click', (e) => {
      e.preventDefault();
      history.pushState(null, '', '/blog/');
      renderView();
    });

    // Convert relative navigation clicks on list view card items to use history pushState
    document.getElementById('blog-posts-container').addEventListener('click', (e) => {
      const card = e.target.closest('.blog-card');
      if (card) {
        e.preventDefault();
        const href = card.getAttribute('href');
        history.pushState(null, '', href);
        renderView();
      }
    });

    // Run fetching data immediately
    loadBlogData();
    setupRealtime();
    setupNewsletterPopup();

    const headerEl = document.querySelector('header');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 20) {
        headerEl.classList.add('scrolled');
      } else {
        headerEl.classList.remove('scrolled');
      }
    });

    // Newsletter Popup timed trigger
    async function setupNewsletterPopup() {
      // 1. Skip if administrator
      if (localStorage.getItem('faisal_admin_mode') === 'true') {
        return;
      }
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session && session.user && session.user.email === 'faashariff2829@gmail.com') {
          localStorage.setItem('faisal_admin_mode', 'true');
          return;
        }
      } catch (e) {
        console.error(e);
      }

      // 2. Skip if shown/dismissed in last 7 days
      const lastShown = localStorage.getItem('faisal_newsletter_popup_dismissed_time');
      if (lastShown) {
        const diff = Date.now() - parseInt(lastShown, 10);
        if (diff < 7 * 24 * 60 * 60 * 1000) {
          return;
        }
      }

      // 3. Trigger popup after 15 seconds
      setTimeout(() => {
        showNewsletterPopup();
      }, 15000);
    }

    function showNewsletterPopup() {
      const popup = document.getElementById('newsletter-popup');
      if (!popup) return;

      // Mark as shown immediately
      localStorage.setItem('faisal_newsletter_popup_dismissed_time', Date.now().toString());

      popup.classList.add('show');

      // Dismiss triggers
      const closeBtn = document.getElementById('btn-close-popup');
      const closePopup = () => {
        popup.classList.remove('show');
      };
      
      closeBtn.addEventListener('click', closePopup);
      popup.addEventListener('click', (e) => {
        if (e.target === popup) {
          closePopup();
        }
      });

      // Form submission
      const form = document.getElementById('popup-signup-form');
      const emailInput = document.getElementById('popup-email-input');
      const msgDiv = document.getElementById('popup-message');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        if (!email) return;

        emailInput.disabled = true;
        const submitBtn = form.querySelector('button[type="submit"]');
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.innerText = 'Submitting...';
        }

        msgDiv.className = 'popup-message';
        msgDiv.innerText = '';
        msgDiv.style.opacity = '1';

        try {
          // Format source page path nicely
          let sourcePage = window.location.pathname;
          const urlParams = new URLSearchParams(window.location.search);
          const postSlug = urlParams.get('post');
          if (postSlug) {
            sourcePage = `/founders-notes/${postSlug}`;
          } else if (sourcePage === '/' || sourcePage.endsWith('/index.html')) {
            sourcePage = 'Home';
          } else if (sourcePage.includes('/blog')) {
            sourcePage = 'Founder Notes List';
          }

          const { error } = await supabaseClient
            .from('subscribers')
            .insert([{ email, source_page: sourcePage }]);

          if (error) throw error;

          msgDiv.classList.add('success');
          msgDiv.innerText = 'Successfully subscribed!';
          form.reset();

          // Auto close after 1.5 seconds
          setTimeout(() => {
            closePopup();
          }, 1500);
        } catch (err) {
          console.error('Popup subscription error:', err);
          msgDiv.classList.add('error');
          msgDiv.innerText = 'Error submitting. Please try again.';
          emailInput.disabled = false;
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Count Me In';
          }
        }
      });
    }
  </script>

  <!-- =================================================================
       NEWSLETTER POPUP MODAL
  ================================================================== -->
  <div id="newsletter-popup" class="newsletter-popup-overlay">
    <div class="newsletter-popup-content">
      <button class="newsletter-popup-close" id="btn-close-popup" aria-label="Close popup">&times;</button>
      <h2>Stay in the loop</h2>
      <p>Sign up to get notified on new ventures, building progress, and founder's notes.</p>
      <form id="popup-signup-form" class="popup-signup-form">
        <input type="email" id="popup-email-input" placeholder="Enter your email" required />
        <button type="submit" class="btn-solid">Count Me In</button>
      </form>
      <div id="popup-message" class="popup-message"></div>
    </div>
  </div>
</body>
</html>
